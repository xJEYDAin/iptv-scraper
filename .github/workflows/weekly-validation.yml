name: Weekly Full Validation (Sunday)

on:
  # 每周日凌晨4点运行全量验证
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create required directories
        run: mkdir -p cache logs sources filtered output

      - name: Compute sources cache key
        id: cache-key
        run: |
          DATE_KEY=$(date +'%Y%m%d')
          if [ -d "sources" ]; then
            SOURCES_HASH=$(find sources -type f -name "*.m3u" | sort | xargs cat 2>/dev/null | md5sum | cut -c1-8)
          else
            SOURCES_HASH="empty"
          fi
          CACHE_KEY="validation-cache-${DATE_KEY}-${SOURCES_HASH}"
          echo "cache_key=${CACHE_KEY}" >> $GITHUB_OUTPUT

      - name: Restore validation cache
        id: cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: ${{ steps.cache-key.outputs.cache_key }}
          restore-keys: |
            validation-cache

      # ── 全量验证：强制重新验证所有 URL ────────────────────────────────────
      - name: Run full validation
        run: |
          echo "Weekly full validation run"
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          # FORCE_VALIDATION=1 强制忽略缓存，直接验证所有 URL
          FORCE_VALIDATION=1 python main.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f output/hk_merged.m3u output/all_merged.m3u
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-scraper.git"
          git commit -m "Weekly full validation: $(date +'%Y-%m-%d %H:%M')" --allow-empty || true
          git push origin master

      - name: Upload updated cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: ${{ steps.cache-key.outputs.cache_key }}
