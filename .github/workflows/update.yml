name: Update HK IPTV

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [master]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Create required directories
        run: |
          mkdir -p cache logs sources filtered output
      
      - name: Restore validation cache
        id: cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: validation-cache  # Static key - persists across runs
          restore-keys: |
            validation-cache
      
      - name: Run scraper
        run: |
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          # Skip validation if cache exists (use cached validation results)
          if [ "${{ steps.cache.outputs.cache-hit }}" == "true" ]; then
            echo "Using cached validation results"
            SKIP_VALIDATION=1 python main.py
          else
            echo "No cache - running full validation"
            python main.py
          fi
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制添加输出文件
          git add -f output/hk_merged.m3u output/all_merged.m3u
          
          # 重写 remote URL 使用 token 认证
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-scraper.git"
          
          # 总是尝试 commit 并推送
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" --allow-empty || true
          git push origin master
      
      - name: Upload cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: validation-cache  # Always use static key
