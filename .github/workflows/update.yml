name: Update HK IPTV

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [master]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Checkout iptv-validator (for validation cache)
        uses: actions/checkout@v4
        with:
          repository: xJEYDAin/iptv-validator
          path: iptv-validator
          fetch-depth: 1
      
      - name: Copy validation cache from iptv-validator
        run: |
          mkdir -p cache
          if [ -f "iptv-validator/cache/validation_cache.json" ]; then
            cp iptv-validator/cache/validation_cache.json cache/
            echo "Copied validation cache from iptv-validator"
            cat cache/validation_cache.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Cache entries: {len(d)}')"
          else
            echo "No validation cache found in iptv-validator, will run without cache"
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Create required directories
        run: mkdir -p cache logs sources filtered output

      - name: Run scraper
        run: |
          # Skip validation since we rely on iptv-validator's results
          echo "Using validation cache from iptv-validator"
          SKIP_VALIDATION=1 python main.py
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制添加输出文件
          git add -f output/hk_merged.m3u output/all_merged.m3u
          
          # 重写 remote URL 使用 token 认证
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-scraper.git"
          
          # 总是尝试 commit 并推送
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" --allow-empty || true
          git push origin master
