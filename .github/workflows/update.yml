name: Update HK IPTV

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [master]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Checkout iptv-validator
        uses: actions/checkout@v4
        with:
          repository: xJEYDAin/iptv-validator
          path: iptv-validator
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Create required directories
        run: mkdir -p cache logs sources filtered output

      - name: Run scraper
        run: |
          echo "Using validation cache from iptv-validator"
          SKIP_VALIDATION=1 python main.py
      
      - name: Commit and push scraper outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制添加输出文件
          git add -f output/hk_merged.m3u output/all_merged.m3u
          
          # 重写 remote URL 使用 token 认证
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-scraper.git"
          
          # 总是尝试 commit 并推送
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" --allow-empty || true
          git push origin master
      
      - name: Push filtered files to iptv-validator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd iptv-validator
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-validator.git"
          
          # 同步 filtered 文件
          mkdir -p filtered
          rm -rf filtered/* 2>/dev/null || true
          if [ "$(ls -A ../filtered/*.m3u* 2>/dev/null)" ]; then
            cp ../filtered/*.m3u* filtered/
          fi
          
          # 提交并推送
          git add -f filtered/
          if git diff --staged --quiet; then
            echo "No filtered changes"
          else
            git commit -m "Sync filtered: $(date +'%Y-%m-%d %H:%M')" || true
            git push
          fi
