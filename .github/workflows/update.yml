name: Update HK IPTV

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [master]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Create required directories
        run: |
          mkdir -p cache logs sources filtered output
      
      - name: Restore validation cache
        id: cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: validation-cache  # Static key - persists across runs
          restore-keys: |
            validation-cache
      
      - name: Run scraper
        run: |
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          # Skip validation if cache exists (use cached validation results)
          if [ "${{ steps.cache.outputs.cache-hit }}" == "true" ]; then
            echo "Using cached validation results"
            SKIP_VALIDATION=1 python main.py
          else
            echo "No cache - running full validation"
            python main.py
          fi
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制添加被 gitignore 的输出文件
          git add -f output/*.m3u
          
          # 检查是否有更改
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
      
      - name: Upload cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: validation-cache  # Always use static key
